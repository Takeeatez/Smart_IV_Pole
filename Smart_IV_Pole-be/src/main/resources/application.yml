spring:
  application:
    name: SmartPole

  datasource:
    url: jdbc:mariadb://61.245.248.178:3306/smartpole
    username: yizy
    password: smartpole*
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:                # ← spring.datasource.hikari 로 이동
      pool-name: SmartpolePool
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: create
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false        # ← 이 값만 사용
    open-in-view: false    # ← 경고 메시지 제거
    properties:
      hibernate:
        format_sql: true
        # show_sql: false  # ← 여긴 삭제(오타 'fals e' 있었던 자리)

  # Connection Pool (HikariCP)  # ← 주석만 유지, 실제 설정은 위로 이동

server:
  port: 8081

logging:
  level:
    com.example.smartpole: INFO
    org.hibernate.SQL: ERROR
    org.hibernate.type.descriptor.sql.BasicBinder: ERROR